# Services:
#   kafka-1/2/3    — 3-broker KRaft cluster (no ZooKeeper)
#   kafka-init     — one-shot topic creation
#   postgres       — analytics storage (fact + dim tables)
#   producer       — Python app, publishes insurance events
#   consumer       — Python app, consumes & writes to PostgreSQL
#
# Usage:
#   cp .env.example .env   # fill in production secrets
#   docker compose up -d

networks:
  streaming-net:
    driver: bridge

volumes:
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  postgres-data:

# ─────────────────────────────────────────────────────────────
# Shared Kafka environment (YAML anchor to avoid repetition)
# ─────────────────────────────────────────────────────────────
x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.9.0
  networks: [streaming-net]
  environment: &kafka-env
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    # KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:SASL_SSL # production
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_LOG_RETENTION_HOURS: 168
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
  healthcheck:
    test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
    interval: 10s
    timeout: 10s
    retries: 10

services:
  # ─────────────────────────────────────
  # Kafka Broker 1
  # ─────────────────────────────────────
  kafka-1:
    <<: *kafka-common
    hostname: kafka-1
    container_name: kafka-1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data-1:/var/lib/kafka/data
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://kafka-1:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092

  # ─────────────────────────────────────
  # Kafka Broker 2
  # ─────────────────────────────────────
  kafka-2:
    <<: *kafka-common
    hostname: kafka-2
    container_name: kafka-2
    volumes:
      - kafka-data-2:/var/lib/kafka/data
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092

  # ─────────────────────────────────────
  # Kafka Broker 3
  # ─────────────────────────────────────
  kafka-3:
    <<: *kafka-common
    hostname: kafka-3
    container_name: kafka-3
    volumes:
      - kafka-data-3:/var/lib/kafka/data
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092

  # ─────────────────────────────────────
  # Kafka Topic Initializer (one-shot)
  # ─────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka-init
    networks: [streaming-net]
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    volumes:
      - ./init:/init
    entrypoint: ["/bin/bash", "/init/init_kafka_topics.sh"]

  # ─────────────────────────────────────
  # PostgreSQL — Analytics Storage
  # ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    networks: [streaming-net]
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────
  # Python Producer
  # ─────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    networks: [streaming-net]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      EVENTS_PER_SECOND: "5"
      LOG_LEVEL: INFO
    restart: on-failure

  # ─────────────────────────────────────
  # Python Consumer
  # ─────────────────────────────────────
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    networks: [streaming-net]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_GROUP_ID: prudential-consumer-group
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_LEVEL: INFO
    restart: on-failure
    deploy:
      replicas: 3


  # ─────────────────────────────────────
  # Kafka UI — Broker Management Console
  # ─────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    networks: [streaming-net]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
